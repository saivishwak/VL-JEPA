name: vl-jepa-sft-open-vqa
run_root: runs

model:
  vision_encoder: facebook/vjepa2-vitl-fpc64-256
  predictor_model: meta-llama/Llama-3.2-1B
  target_encoder: google/embeddinggemma-300m
  decoder_model: null
  embedding_dim: 1536
  predictor_layers: 8
  max_query_length: 512
  max_target_length: 512
  image_size: 256
  num_frames: 1
  freeze_x_encoder: true
  y_encoder_lr_multiplier: 0.05
  temperature: 0.07
  trust_remote_code: true
  hf_token: true
  torch_dtype: auto
  tiny: false

data:
  # Generate with:
  # vl-jepa download-open --dataset vqav2 --split validation --output-dir data/vl_jepa
  # Alternative smaller open VQA source:
  # vl-jepa download-open --dataset ok_vqa --split validation --output-dir data/vl_jepa
  train_file: data/vl_jepa/vqav2_validation.jsonl

training:
  # Paper SFT: 83k steps, effective global batch 3,072, cosine LR.
  # RTX 4090 24GB local setting: true InfoNCE contrastive batch =
  # batch_size * contrastive_accum_batches = 8. This gives a more meaningful
  # contrastive loss than batch 2, while staying practical for local image VQA.
  seed: 42
  deterministic: true
  # SFT must continue from a VL-JEPA pretraining checkpoint, not just the raw
  # V-JEPA/Llama/EmbeddingGemma component initializations.
  # This resolves the latest runs/*-vl-jepa-pretrain-video-32f/checkpoint-final/model.pt.
  # Override with init_checkpoint: /path/to/checkpoint-final or /path/to/model.pt if needed.
  init_checkpoint_run_name: vl-jepa-pretrain-video-32f
  require_init_checkpoint: true
  max_steps: 83000
  paper_effective_batch_size: 3072
  batch_size: 2
  contrastive_accum_batches: 4
  # VQA has many repeated short answers. Treat identical target texts in the
  # same batch as additional positives instead of false negatives.
  multi_positive_by_text: true
  grad_accum: 1
  learning_rate: 5.0e-5
  min_learning_rate: 0.0
  scheduler: cosine
  weight_decay: 0.0
  num_workers: 0
  tensorboard: true
  log_steps: 10
  # Save model checkpoints every N optimizer steps during long local runs.
  checkpoint_steps: 10000
