name: vl-jepa-smoke-tiny
run_root: runs

model:
  vision_encoder: tiny
  predictor_model: tiny
  target_encoder: tiny
  decoder_model: null
  embedding_dim: 64
  predictor_layers: 2
  max_query_length: 64
  max_target_length: 64
  image_size: 32
  num_frames: 1
  freeze_x_encoder: true
  y_encoder_lr_multiplier: 0.05
  temperature: 0.07
  trust_remote_code: true
  hf_token: true
  torch_dtype: null
  tiny: true

data:
  train_file: data/vl_jepa/smoke_train.jsonl

training:
  seed: 42
  num_epochs: 1
  batch_size: 2
  grad_accum: 1
  learning_rate: 1.0e-3
  weight_decay: 0.0
  num_workers: 0
  max_steps: 2
  tensorboard: true
  log_steps: 1
