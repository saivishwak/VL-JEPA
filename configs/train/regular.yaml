name: regular-gsm8k
run_root: runs

model:
  name: meta-llama/Llama-3.2-1B-Instruct
  torch_dtype: auto
  trust_remote_code: true

data:
  train_file: data/gsm8k/gsm8k_train.jsonl
  eval_file: data/gsm8k/gsm8k_test.jsonl
  max_length: 2048

training:
  seed: 42
  num_epochs: 4
  batch_size: 1
  eval_batch_size: 1
  grad_accum: 8
  learning_rate: 1.0e-5
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  bf16: true
  report_to: none

jepa:
  regular: true

lora:
  enabled: true
  rank: 16
  dropout: 0.1
